[pytest]
testpaths = tests
norecursedirs = .git
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    # Only silence deprecation warnings from third-party deps where we cannot
    # act. Keep Home Assistant / custom_components warnings visible so we catch
    # breaking changes early.
    ignore::DeprecationWarning:botocore.*
    ignore::DeprecationWarning:aiobotocore.*
    ignore::DeprecationWarning:onvif.*
    ignore::DeprecationWarning:zeep.*
    ignore::pytest.PytestUnraisableExceptionWarning
