name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install dependencies
        run: pip install ruff bandit codespell

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run bandit security check
        run: bandit -r custom_components/ajax/ -c pyproject.toml

      - name: Run codespell
        run: codespell custom_components/ajax/

  typing:
    name: Typing (mypy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # We're at 0 errors under the project's mypy config (see pyproject.toml).
    # The job now blocks merges — flipping --strict for full Platinum
    # strict-typing is the next milestone (see quality_scale.yaml).
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # 3.14 matches the project's runtime: the test harness
          # (pytest-homeassistant-custom-component) and recent Home Assistant
          # releases require it, and mypy must parse HA's 3.14 source.
          python-version: "3.14.6"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install dependencies
        # mypy only needs itself + homeassistant for stubs — NOT the pytest
        # test harness. Pulling requirements_test.txt here used to fail the
        # job on a Python-version conflict before mypy ever ran. Pin mypy so
        # this mandatory gate stays reproducible; bump deliberately.
        run: pip install "mypy==2.1.0" homeassistant

      - name: Run mypy
        run: mypy custom_components/ajax/

  tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # 3.14 matches the project's runtime: pytest-homeassistant-custom-component
          # and the pinned homeassistant in requirements_test.txt require it. The old
          # job pinned 3.12 and failed to install before a single test ran.
          python-version: "3.14.6"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install dependencies
        # No editable install: there is no [project]/setup.py to build, and the suite
        # imports custom_components.ajax directly from the repo root, so the test
        # requirements are all that's needed.
        run: pip install -r requirements_test.txt

      - name: Run tests with coverage
        # python -m pytest puts the repo root on sys.path so custom_components.ajax
        # imports without an editable install.
        run: python -m pytest tests/ --cov=custom_components/ajax --cov-report=term-missing
